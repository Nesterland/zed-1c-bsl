name = "BSL"
grammar = "bsl"
path_suffixes = ["bsl", "osl"]
line_comments = ["//"]
tab_size = 4
hard_tabs = false
language_servers = ["bsl"]

[[brackets]]
start = "("
end = ")"
close = true
newline = false

[[brackets]]
start = "["
end = "]"
close = true
newline = false

[[brackets]]
start = "\""
end = "\""
close = true
newline = false
not_in = ["string", "comment"]
